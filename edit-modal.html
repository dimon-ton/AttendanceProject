

  <div class="modal fade" id="editData" tabindex="-1" aria-labelledby="editDataModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">

          <div class="container">

            <form id="editStudent">


              <div class="form-group">

                  </tr>
                </thead>

                <tbody id="studentData">

                </tbody>

              </table>
                      <!-- Loading Spinner -->
              <div id="loading-spinner-table" class="d-flex justify-content-center align-items-center">
                <div class="spinner-border text-primary" role="status" style="display: block;">
                    <span class="sr-only aria-hidden">Loading...</span>
                </div>
              </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>

            กำลังบันทึก...

        </div>

        </form>

      </div>
